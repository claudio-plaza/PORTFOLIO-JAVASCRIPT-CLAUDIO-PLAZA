<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 1</title>

  <!-- 🎨 Estilos básicos -->
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f7f9fc;
    }

    button {
      padding: 10px 20px;
      background: #4b9ed6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    img {
      max-width: 300px;
      border-radius: 12px;
      box-shadow: 0 0 10px #ccc;
    }
  </style>

  <!-- 🧱 Si usas Bootstrap, el nombre del archivo debe ser correcto -->
  <!-- Asegúrate que el archivo exista en la misma carpeta -->
  <link rel="stylesheet" href="bootstrap.min.css">
</head>
<body>

  <!-- 🏷️ Título de la página -->
  <h1>Mi API número uno</h1>

  <!-- 🧩 Campo para escribir el texto de búsqueda -->
  <input type="text" id="ingresoDatos" placeholder="Escribe una ciudad o nombre">

  <!-- 🔍 Botón que iniciará la búsqueda -->
  <button id="buscar">Buscar</button>

  <!-- 📦 Aquí se mostrarán los resultados -->
  <div id="resultado"></div>

  <!-- ⚙️ Enlace correcto al script -->
  <!-- IMPORTANTE: el archivo se debe llamar exactamente igual -->
  <script src="scriptApi1.js"></script>

</body>
</html>
